services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.platform
    container_name: design-output-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./platform_runtime:/app/platform_runtime
    ports:
      - "${PLATFORM_BIND:-127.0.0.1}:${PLATFORM_PORT:-8000}:${PLATFORM_PORT:-8000}"
    command: ["python", "-m", "platform_backend.app"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.platform
    container_name: design-output-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./platform_runtime:/app/platform_runtime
    command: ["python", "-m", "platform_backend.app.worker"]
