<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>设计出图 - 管理后台</title>
    <link rel="icon" type="image/svg+xml" href="/user/datadog.svg" />
    <link rel="shortcut icon" href="/user/datadog.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">内部管理</p>
          <h1>设计出图管理后台</h1>
        </div>
        <div class="top-actions">
          <span id="adminBadge" class="badge">未登录</span>
          <a class="link-button" href="/user/">用户端</a>
          <button id="logoutButton" class="ghost" type="button" hidden>退出</button>
        </div>
      </header>

      <section id="loginPanel" class="panel login-panel">
        <div>
          <p class="eyebrow">登录</p>
          <h2>管理员账号</h2>
        </div>
        <form id="loginForm" class="grid-form">
          <label>
            <span>账号</span>
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            <span>密码</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">登录</button>
        </form>
      </section>

      <section id="adminPanel" hidden>
        <section class="stats-grid" id="statsGrid"></section>

        <div class="content-grid">
          <article class="panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">用户</p>
                <h2>账号、额度和存储</h2>
              </div>
              <button id="createUserButton" class="primary" type="button">新建账号</button>
            </div>
            <form id="createUserForm" class="inline-form" hidden>
              <input name="username" placeholder="账号" required />
              <input name="display_name" placeholder="显示名" />
              <input name="password" minlength="8" placeholder="初始密码至少 8 位，留空自动生成" />
              <select name="role">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
              </select>
              <input name="concurrent_limit" type="number" min="1" max="50" value="20" />
              <input name="storage_limit_mb" type="number" min="100" value="10240" />
              <button class="primary" type="submit">创建</button>
            </form>
            <div id="usersList" class="list"></div>
          </article>

          <article class="panel settings-panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">默认配置</p>
                <h2>请求地址、模型和提示词</h2>
              </div>
              <button id="saveGlobalSettingsButton" class="primary" type="button">保存默认配置</button>
            </div>
            <div id="settingsForm" class="settings-stack"></div>
          </article>
        </div>

        <article class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">任务</p>
              <h2>全量任务</h2>
            </div>
            <button id="openAdminLogsButton" class="ghost" type="button">总日志</button>
            <button id="refreshButton" class="ghost" type="button">刷新</button>
          </div>
          <div id="jobsList" class="list"></div>
        </article>
      </section>
    </main>
    <div id="logModal" class="modal" hidden>
      <div class="modal-backdrop" data-log-close></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="logModalTitle">
        <header class="modal-head">
          <div>
            <p class="eyebrow">任务日志</p>
            <h2 id="logModalTitle">日志详情</h2>
          </div>
          <button class="ghost" type="button" data-log-close>关闭</button>
        </header>
        <div id="logEntryTabs" class="log-tabs"></div>
        <small id="logEntryPath" class="log-path"></small>
        <pre id="logModalContent" class="log-content"></pre>
      </section>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
